<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Machine translation rewrites the DOM under React and crashes
         navigation; keep the page in its authored language. -->
    <meta name="google" content="notranslate" />
    <meta
      name="description"
      content="Verdé, Indoor Plant Co. Easy-going houseplants delivered to your door, with a plain care guide for every leaf."
    />
    <title>Verdé | Indoor Plant Co.</title>
    <!-- Brand typography: a warm display serif paired with a clean humanist sans.
         System-font fallbacks keep the layout readable even offline. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Nunito+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
